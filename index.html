<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Tic Tac Toe</h1>
    </header>

    <div class="choices-container">
        <div class="btn marker-btn" id="marker-x" data-marker="X">
        </div>
        <div class="btn marker-btn" id="marker-o" data-marker="O">
        </div>
    </div>

    <div class="game-board">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </div>

    <div class="congratulation-modal">
        <div class="congratulation-content">
            <span>The winner is Human!</span> 
            <button class="btn">Play Again</button>   
        </div>
    </div>

    <button class="btn reset-btn" id="play-again-btn">Reset</button>
    <script src="main.js"></script>
</body>
</html>

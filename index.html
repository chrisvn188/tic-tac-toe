<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Tic Tac Toe</h1>
    </header>

    <div class="choices-container">
        <div class="btn choice-x active">
            <span>X</span>
            <span>-</span> 
        </div>
        <div class="btn choice-o">
            <span>O</span>
            <span>-</span> 
        </div>
    </div>

    <div class="game-board">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <button class="btn reset-btn">Reset</button>
    <script src="main.js"></script>
</body>
</html>
